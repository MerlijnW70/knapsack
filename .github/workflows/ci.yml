name: ci
# Build + test on every push and PR across the three host platforms we ship
# binaries for. Closes the gap between "passes locally on Windows" and the
# Unix-only failure modes (POSIX chmod read-only FS, real SIGINT) that the
# round-10 brief called out as the biggest remaining unknowns.
#
# The release.yml workflow already runs `cargo test --release` on the same
# three platforms — but only on a tag push, so the first time we'd notice a
# Linux/macOS regression was when cutting a release. This runs on every push.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual re-runs from the Actions tab.
  workflow_dispatch:

# Cancel an older run on the same branch when a new commit arrives — the older
# run's signal is stale anyway.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Color in cargo output makes CI logs scannable. RUST_BACKTRACE on a test
  # failure costs nothing and saves a re-run on first surprise.
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other platforms when one fails — a Linux-only failure
      # is a Linux problem, not a reason to lose the Windows + macOS signal.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      # Cache target/ keyed by Cargo.lock so re-runs on the same lockfile reuse
      # compiled deps. Zero-runtime-dep keeps this small.
      - name: Cache cargo build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Release build first, so the test step picks up the binary the SIGINT /
      # subprocess tests shell out to. `cargo test --release` would build it
      # anyway, but doing it as a separate step keeps the failure attribution
      # clean: "build failed" vs "tests failed" is one step away in CI logs.
      - name: Build (release)
        run: cargo build --release --tests

      - name: Test (release)
        run: cargo test --release --no-fail-fast
